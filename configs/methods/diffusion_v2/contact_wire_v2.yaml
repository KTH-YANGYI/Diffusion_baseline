repo_root: ../../..
dataset_root: C:/Users/18046/Desktop/master/masterthesis/dataset_real
model_id_or_path: stable-diffusion-v1-5/stable-diffusion-inpainting
output_root: ../../../artifacts/dataset_real/methods/diffusion_v2

roi_out_size: 512
mask_edit_dilate_px: 4
mask_paste_dilate_px: 2
mask_paste_blur_px: 1.0

seeds_per_pair: 8
inference_batch_size: 1
planning_seed: 20260413

prompt: "ctwirecrack, close-up grayscale railway contact wire surface, one thin dark longitudinal hairline crack inside the masked area, realistic macro inspection photo, sharp focus"
negative_prompt: "cartoon, painting, colorful, rust, dirt, text, watermark, blur, low contrast, duplicate crack, double crack, extra branches, large hole, blob, broken background"

num_inference_steps: 40
guidance_scale: 4.5
strength: 0.45
mask_blur: 1.0
padding_mask_crop: 64

local_inpaint: true
local_crop_size: 160
background_overlay: true
overlay_blur_px: 1.0
