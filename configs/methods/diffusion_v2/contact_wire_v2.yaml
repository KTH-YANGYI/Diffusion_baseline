save_guide_image: true
save_diff_abs: true
save_quality_metrics: true
debug_output_dir_name: debug

guide_crack: false
guide_darken: 25.0
guide_blur: 0.6
guide_label_dilate_px: 1

crack_prior_mode: paired_residual
crack_prior_alpha: 0.65
crack_prior_clip_percentile: 95
crack_prior_mask_dilate_px: 2
crack_prior_blur_px: 0.4

candidate_local_crop_sizes: [128, 160]
candidate_strengths: [0.35, 0.45, 0.55]
candidate_residual_alphas: [0.35, 0.65]
candidate_seed_count: 2
candidate_guidance_scale: 4.5
candidate_lora_scale: 0.8
top_candidates_per_pair: 3

lora_path: ../../../artifacts/dataset_real/methods/diffusion_v2/lora_ctwirecrack_v2
