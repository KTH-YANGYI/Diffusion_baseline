repo_root: ../../..
dataset_root: ../../../data/contact_wire_v1
manifests_root: ../../../artifacts/contact_wire_v1/manifests
fold_index: 0
model_id_or_path: stable-diffusion-v1-5/stable-diffusion-inpainting
output_root: ../../../artifacts/contact_wire_v1/methods/diffusion_baseline

roi_margin_px: 96
roi_out_size: 512
mask_edit_dilate_px: 3

backgrounds_per_donor: 4
seeds_per_pair: 4
inference_batch_size: 1
planning_seed: 20260413
background_selection_mode: same_video_id

prompt: "close-up industrial metallic contact wire surface, thin hairline crack, realistic, macro photo, monochrome, sharp focus"
negative_prompt: "cartoon, painting, colorful, rust, dirt, text, watermark, blur, low contrast, duplicate crack, double crack, extra branches, broken background"

num_inference_steps: 35
guidance_scale: 5.5
strength: 0.88
mask_blur: 1.0

device: auto
dtype: float16
local_files_only: false
enable_attention_slicing: true
enable_xformers: false
